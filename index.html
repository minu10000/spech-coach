<!DOCTYPE html>

    <nav class="navbar">
        <div class="nav-brand">🎤 스치코치</div>

        </div>

            <div class="features-grid">

                </div>
                <div class="feature-card">

                    <p>개인 맞춤형 코칭 피드백을 제공합니다</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">📈</div>
                    <h3>성장 추적</h3>
                    <p>연습 기록을 저장하고 성장을 확인하세요</p>
